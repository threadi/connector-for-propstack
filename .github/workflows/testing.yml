name: Testing

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v7

      - name: Install dependencies
        run: composer install

      - name: Set version number 1
        uses: richardrigutins/replace-in-files@v2
        with:
          files: 'connector-for-propstack.php'
          search-text: '@@VersionNumber@@'
          replacement-text: ${{ github.ref_name }}

      - name: Set version number 2
        uses: richardrigutins/replace-in-files@v2
        with:
          files: 'uninstall.php'
          search-text: '@@VersionNumber@@'
          replacement-text: ${{ github.ref_name }}

      - name: Set version number 3
        uses: richardrigutins/replace-in-files@v2
        with:
          files: 'readme.txt'
          search-text: '@@VersionNumber@@'
          replacement-text: ${{ github.ref_name }}

      - name: Run PHPStan check
        run: vendor/bin/phpstan analyse

      - name: PHP Compatibility check
        run: vendor/bin/phpcs -p app --standard=PHPCompatibilityWP --runtime-set testVersion 8.1- --ignore=*/Crypt.php

  phpunit:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.5', '8.4', '8.3', '8.2']
    services:
      database:
        image: mysql:latest
        env:
          MYSQL_DATABASE: wordpress_tests
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
    steps:
      - name: Check out source code
        uses: actions/checkout@v7

      - name: Run package installs and builds
        run: |
          composer install
          composer update
          npm i
          npm i concurrently
          cd vendor/threadi/easy-dialog-for-wordpress/
          npm i
          npm run build
          cd ../easy-setup-for-wordpress/
          npm i
          npm run build
          cd ../../../
          npm run build:archive
          npm run build:single

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: ${{ matrix.php-version }}
            tools: phpunit-polyfills:1.1
            extensions: mbstring, xml, zip, intl, pdo, mysql
            coverage: none

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Setup tests
        run: bash bin/install-wp-tests.sh wordpress_tests root root 127.0.0.1 latest true

      - name: Run tests
        run: composer test
